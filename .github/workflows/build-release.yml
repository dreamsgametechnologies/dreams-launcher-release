name: Launcher Build & Release

# This workflow lives in the PUBLIC release repo
# (dreamsgametechnologies/dreams-launcher-release).
#
# It is triggered by a repository_dispatch event of type "launcher-release"
# sent from the private source repo (dreamsgametechnologies/dreams-launcher) when a
# v<version>-<channel> tag is pushed there.
#
# Flow:
#   1. Check out the private source at the dispatched commit SHA (via PAT).
#   2. `yarn tauri build` produces a platform-native installer for each
#      target: .dmg (macOS), .AppImage (Linux), .msi (Windows). Same
#      shape as Unity Hub / Discord / Figma. BUILD_CHANNEL from the
#      dispatch payload is baked into build_info::BUILD_CHANNEL.
#   3. Generate + sign the v2 manifest (manifest.json) — Ed25519
#      detached signature, verified by the in-launcher updater
#      against the public key embedded in src-tauri/src/manifest_sig.rs.
#   4. Publish two releases on this repo:
#        - v<version>-<channel> : immutable, hosts platform installers + signed manifest
#        - latest-<channel>     : rolling, hosts latest.json + latest.json.sig.
#                                 Auto-updater reads from this URL.

on:
  repository_dispatch:
    types: [launcher-release]

env:
  CARGO_TERM_COLOR: always
  SOURCE_REPO: dreamsgametechnologies/dreams-launcher
  TAG:        ${{ github.event.client_payload.tag }}
  CHANNEL:    ${{ github.event.client_payload.channel }}
  VERSION:    ${{ github.event.client_payload.version }}
  SOURCE_SHA: ${{ github.event.client_payload.source_sha }}

jobs:
  build:
    name: ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target_name: macos-arm64
            target_triple: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: ubuntu-latest
            target_name: linux-x64
            target_triple: x86_64-unknown-linux-gnu
            archive_ext: AppImage
          - os: windows-latest
            target_name: windows-x64
            target_triple: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout source from ${{ env.SOURCE_REPO }} @ ${{ env.SOURCE_SHA }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref:        ${{ env.SOURCE_SHA }}
          token:      ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Materialize env files from secrets
        shell: bash
        env:
          ENV_DEVELOPMENT_FILE: ${{ secrets.ENV_DEVELOPMENT_FILE }}
          ENV_PRODUCTION_FILE:  ${{ secrets.ENV_PRODUCTION_FILE }}
        # Both files are written every run regardless of channel — the
        # cargo cache key hashes their contents (see Cache step below),
        # and missing one would silently change the key and skip
        # otherwise-valid caches. Trailing newline normalized so a
        # paste with/without one produces the same hash. Overwrites
        # any committed copy in A's checkout — by design, since these
        # are the source of truth post-migration.
        run: |
          if [[ -z "${ENV_DEVELOPMENT_FILE:-}" || -z "${ENV_PRODUCTION_FILE:-}" ]]; then
            echo "::error::ENV_DEVELOPMENT_FILE / ENV_PRODUCTION_FILE secrets are not set on this repo. Refusing to build with empty env — Vite would emit JS that throws on Firebase init at app start, producing a black-screen build."
            exit 1
          fi
          printf '%s\n' "$ENV_DEVELOPMENT_FILE" > .env.development
          printf '%s\n' "$ENV_PRODUCTION_FILE"  > .env.production
          # Sanity-check: each file must contain the canonical Vite
          # Firebase keys + the updater endpoint, so a typo in the
          # secret content doesn't ship a broken build.
          for f in .env.development .env.production; do
            for k in VITE_FIREBASE_API_KEY VITE_FIREBASE_PROJECT_ID UPDATER_ENDPOINT_BASE; do
              grep -q "^${k}=" "$f" || { echo "::error::$f missing $k"; exit 1; }
            done
          done
          echo "==> wrote $(wc -l <.env.development) lines to .env.development"
          echo "==> wrote $(wc -l <.env.production) lines to .env.production"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target_triple }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          # Cache key includes .env.* hashes because the launcher reads
          # several of those vars via option_env! (UPDATER_ENDPOINT_BASE,
          # FIREBASE_PROJECT_ID, BUILD_CHANNEL, BUILD_DATE — see
          # src-tauri/src/build_info.rs and crashes.rs). Cargo doesn't
          # track option_env! in its fingerprint, so without this any env
          # change leaves stale .o files with the previous values baked
          # in (and the resulting binary fetches the wrong URLs / silent-
          # fails). CHANNEL is in the key too because dev and stable
          # builds bake different option_env! values from the different
          # .env files; sharing cache between them would cross-poison.
          # Bumping the version segment (v3) force-invalidates older
          # caches that lacked the channel segment.
          key: ${{ runner.os }}-${{ matrix.target_triple }}-${{ env.CHANNEL }}-launcher-v3-${{ hashFiles('src-tauri/Cargo.lock', '.env.development', '.env.production') }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install Node + Yarn
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable && yarn install --frozen-lockfile

      - name: Build launcher bundle (Tauri)
        shell: bash
        env:
          CHANNEL: ${{ env.CHANNEL }}
          # Sign the updater bundles (.app.tar.gz / .AppImage.tar.gz /
          # .msi.zip) inside `tauri build` itself — Tauri picks these up
          # automatically when plugins.updater.pubkey is set in
          # tauri.conf.json. The launcher refuses to apply an unsigned
          # update bundle, so a missing secret would silently produce
          # binaries that can never self-update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        # Mirrors what scripts/build.sh does locally: source the matching
        # .env.<mode> so VITE_FIREBASE_* and UPDATER_ENDPOINT_BASE are in
        # process env at vite-build time (without these, firebase.ts
        # throws on import and the webview shows a black screen). Mirror
        # VITE_FIREBASE_PROJECT_ID into FIREBASE_PROJECT_ID for Cargo's
        # option_env! readers in crashes.rs / build_info.rs. Pass
        # --features dev-features for dev channel so the dev-only Tauri
        # commands compile in; apply the prod tauri.conf overlay (which
        # disables devtools) for stable channel.
        #
        # `shell: bash` ensures Git Bash on the windows-latest runner so
        # `source` and `set -a` work uniformly across all three matrix
        # targets.
        #
        # `yarn tauri build` runs beforeBuildCommand (yarn build), then
        # cargo, then platform-native bundling (.dmg / .msi / .AppImage).
        run: |
          if [[ "$CHANNEL" == "dev" ]]; then
            ENV_FILE=".env.development"
            EXTRA_ARGS=(--features dev-features)
          else
            ENV_FILE=".env.production"
            EXTRA_ARGS=(--config src-tauri/tauri.conf.prod.json)
          fi
          if [[ ! -f "$ENV_FILE" ]]; then
            echo "::error::$ENV_FILE not found in checkout — verify it's committed in the source repo"
            exit 1
          fi
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is unset on dreams-launcher-release. Without it, tauri build cannot sign the updater bundles and the launcher's self-update will refuse to apply them."
            exit 1
          fi
          set -a
          # shellcheck disable=SC1090
          source "$ENV_FILE"
          set +a
          export FIREBASE_PROJECT_ID="$VITE_FIREBASE_PROJECT_ID"
          export BUILD_CHANNEL="$CHANNEL"
          export BUILD_DATE="$(date -u +%F)"
          echo "==> channel=$CHANNEL  env=$ENV_FILE  firebase=$FIREBASE_PROJECT_ID"

          # Tauri exits 0 even when DMG bundling fails (it considers the
          # .app a success) — bundle_dmg.sh sometimes flakes on macOS
          # AppleScript / hdiutil timing in CI, leaving no .dmg behind
          # and a stale /Volumes/dmg.* mount. Mirror the retry logic in
          # scripts/build.sh: build, verify expected artifact, clean up
          # and retry once if missing. Linux/Windows builds are robust
          # enough that the verify is just a sanity check.
          BUNDLE_DIR="src-tauri/target/${{ matrix.target_triple }}/release/bundle"
          case "${{ runner.os }}" in
            macOS)   EXPECT_GLOB="$BUNDLE_DIR/dmg/*.dmg" ;;
            Linux)   EXPECT_GLOB="$BUNDLE_DIR/appimage/*.AppImage" ;;
            Windows) EXPECT_GLOB="$BUNDLE_DIR/msi/*.msi" ;;
          esac
          attempt() {
            yarn tauri build --target ${{ matrix.target_triple }} "${EXTRA_ARGS[@]}"
            compgen -G "$EXPECT_GLOB" >/dev/null
          }
          if ! attempt; then
            echo "==> Expected artifact missing ($EXPECT_GLOB); cleaning up and retrying once"
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              mount | grep -oE '/Volumes/dmg\.[A-Za-z0-9]+' \
                | xargs -I{} hdiutil detach {} -force >/dev/null 2>&1 || true
              rm -f "$BUNDLE_DIR/macos/rw."*".dmg" 2>/dev/null || true
            fi
            if ! attempt; then
              echo "::error::tauri build did not produce $EXPECT_GLOB after two attempts"
              ls -la "$BUNDLE_DIR" || true
              exit 1
            fi
          fi
        # NOTE: bootstrapper build step intentionally dropped. We ship a
        # Unity-Hub-style installer (.dmg / .msi / .AppImage) and the
        # in-launcher updater (src-tauri/src/updater.rs) handles
        # subsequent updates. Bootstrapper has stale URL + channel
        # awareness bugs (bootstrapper/src/main.rs:33) and is a
        # separate cleanup if/when it returns to the user-facing path.

      - name: Stage artifacts (mac)
        if: runner.os == 'macOS'
        run: |
          ./scripts/release/stage-mac.sh \
            "${{ matrix.target_triple }}" \
            "${{ matrix.target_name }}" \
            "dist/release"

      - name: Stage artifacts (linux)
        if: runner.os == 'Linux'
        run: |
          ./scripts/release/stage-linux.sh \
            "${{ matrix.target_triple }}" \
            "${{ matrix.target_name }}" \
            "dist/release"

      - name: Stage artifacts (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./scripts/release/stage-windows.sh \
            "${{ matrix.target_triple }}" \
            "${{ matrix.target_name }}" \
            "dist/release"

      - uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.target_name }}
          path: dist/release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source from ${{ env.SOURCE_REPO }} (for manifest scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref:        ${{ env.SOURCE_SHA }}
          token:      ${{ secrets.SOURCE_REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Inspect staged artifacts
        run: ls -la dist/release

      - name: Generate manifest
        # tauri-plugin-updater format. Tauri's bundler already produced
        # one minisign signature per platform bundle (.app.tar.gz.sig /
        # .AppImage.tar.gz.sig / .msi.zip.sig) during `tauri build`, so
        # this script just reads them and pairs each with the bundle's
        # download URL. The latest.json itself is unsigned — security
        # comes from the per-bundle signature being verified by the
        # launcher against tauri.conf.json's pubkey.
        run: |
          python3 scripts/release/make-manifest.py \
            --version "${VERSION#v}" \
            --release-notes "Dreams Launcher $TAG" \
            --artifacts-dir dist/release \
            --download-base "https://github.com/${{ github.repository }}/releases/download/$TAG/" \
            --out dist/release/manifest.json
          cat dist/release/manifest.json

      - name: Publish versioned release ${{ env.TAG }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$CHANNEL" = "dev" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --repo  "${{ github.repository }}" \
            --title "Dreams Launcher $TAG" \
            --notes "Automated release for channel: $CHANNEL (source $SOURCE_SHA)" \
            $PRERELEASE_FLAG \
            dist/release/* \
          || gh release upload "$TAG" --repo "${{ github.repository }}" --clobber dist/release/*

      - name: Move rolling tag latest-${{ env.CHANNEL }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # tauri-plugin-updater polls only latest.json on this rolling
        # release. The per-platform .sig files live INSIDE the versioned
        # release and are referenced by URL from latest.json — no need
        # to copy a manifest .sig here anymore.
        run: |
          ROLLING="latest-$CHANNEL"
          gh release delete "$ROLLING" --repo "${{ github.repository }}" --yes --cleanup-tag || true
          cp dist/release/manifest.json dist/release/latest.json
          gh release create "$ROLLING" \
            --repo  "${{ github.repository }}" \
            --title "Latest $CHANNEL" \
            --notes "Rolling pointer to $TAG. tauri-plugin-updater fetches latest.json from here." \
            --prerelease \
            dist/release/latest.json
